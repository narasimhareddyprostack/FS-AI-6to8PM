<html>
    <head>
        <title>Login Details</title>
    </head>
    <body>
        <h3>Login Page</h3>
        <form action="/login">
           <div>
           
            <input type="email" required placeholder="Email Id"/>
           </div>

           <div>
           
            <input type="password" required placeholder="Password - special char & symbol"/>
           </div>
            <div>
           
            <input type="text" required value="India"/>
           </div>
           <input type="submit" value="Login">
        </form>
        
    </body>  
</html>
