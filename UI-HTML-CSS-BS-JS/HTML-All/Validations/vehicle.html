<html>
    <head></head>
    <body>
        <h3>Pay Traffic Challan</h3>
        <form action="/challan">
            <div>
                <label >Vehicle Number:</label>
               <!--  <input type="text" 
                       placeholder="Enter Vehicle Number:" 
                       required 
                       pattern="^KA[0-9]{2}[a-zA-Z]{2}[0-9]{4}" /> -->
            <!--  <input type="text" 
                       placeholder="Enter Vehicle Number:" 
                       required 
                       pattern="^KA\d{2}\w{2}\d{4}" /> -->
            <input 
                type="text" 
                pattern="^KA-[0-9]{2}-[A-Z]{1,2}-[0-9]{4}$"
                placeholder="KA-01-AB-1234"
                title="Format: KA-XX-YY-1234 (X = digits, Y = letters, e.g., KA-01-AB-1234)"
                maxlength="15"
                >
            </div>
            <div>
                <label >Password:</label>
               <input type="password" 
                name="password"
                pattern="^(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&])[A-Za-z\d@$!%*?&]{6}$"
                title="Password must be 6 characters long with at least one uppercase letter, one digit, and one special character"
                required>
            </div>
            <input type="submit" value="Search">
        </form>
    </body>
</html>
