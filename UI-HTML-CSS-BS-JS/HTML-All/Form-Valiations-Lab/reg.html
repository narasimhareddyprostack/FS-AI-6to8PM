<!DOCTYPE html>
<html>
<head>
<title>User Name Validation</title>
</head>
<body>
    <h3>Data Validation</h3>
    <form action="/reg">
        <div>
          <label>User Name:</label>
            <input 
            type="text"
            name="username"
            placeholder="Example: A1@abc"
            pattern="^(?=.*[A-Z])(?=.*[0-9])(?=.*[^A-Za-z0-9]).{6}$"
            title="User Name must be exactly 6 characters and contain at least 1 uppercase letter, 1 digit, and 1 special symbol"
            required/>
        </div>
         <br>
        <div>
            <label>Mobile No:</label>
            <input type="text" required pattern="[6-9]\d{9}" title="Enter Mobile Number starting 6/7/8/9 series with 10 Digits"/>
        </div>
         <br>
        <div>
            <label>Email Id:::</label>
            <input type="email" required placeholder="Enter Email Id"/>
        </div>
        <br>
        <div>
            <label >Password:</label>
          
            <input 
            type="text"
            name="Password"
            placeholder="Example: A1@abc"
            pattern="^(?=.*[A-Z])(?=.*[0-9])(?=.*[^A-Za-z0-9]).{6}$"
            title="Password must be exactly 6 characters and contain at least 1 uppercase letter, 1 digit, and 1 special symbol"
            required/>
        </div>
       <br>
    <input type="submit" value="Submit">
    <input type="reset" value="Cancel">

    </form>

</body>
</html>
